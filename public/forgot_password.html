<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veritas AI | Forgot Password</title>
    <link
      rel="icon"
      type="image/png"
      href="assets/images/logo_without_bg.png"
    />
    <link rel="stylesheet" href="assets/css/forgot_password.css" />
  </head>
  <body>
    <main class="forgot-page">
      <section class="illustration-panel">
        <img
          class="illustration-panel__robot"
          src="assets/images/Robot_veritas.png"
          alt="Veritas AI robot illustration"
        />
        <div class="illustration-panel__content">
          <h1 class="illustration-panel__title">Recover Access</h1>
          <p class="illustration-panel__text">
            Reset your password securely and continue verifying news credibility
            with Veritas AI.
          </p>
        </div>
      </section>

      <section class="form-panel">
        <div class="form-card">
          <header class="form-card__header">
            <img
              class="form-card__logo"
              src="assets/images/logo_without_bg.png"
              alt="Veritas AI"
            />
          </header>

          <h2 class="form-card__title" id="stepTitle">Reset Password</h2>
          <p class="form-card__subtitle" id="stepSubtitle">
            Enter your registered email address to receive a verification code.
          </p>

          <div class="step-indicator">
            <span
              class="step-indicator__item is-active"
              id="stepDotEmail"
            ></span>
            <span class="step-indicator__line" id="stepLineCode"></span>
            <span class="step-indicator__item" id="stepDotCode"></span>
            <span class="step-indicator__line" id="stepLinePassword"></span>
            <span class="step-indicator__item" id="stepDotPassword"></span>
          </div>

          <form id="forgotForm" class="forgot-form" novalidate>
            <section class="form-step is-active" id="emailStep">
              <div class="form-field" id="emailField">
                <span class="form-field__icon" aria-hidden="true">&#9993;</span>
                <label for="email" class="visually-hidden">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-field__input"
                  placeholder="Email Address"
                  autocomplete="email"
                />
              </div>
              <p class="form-field__error" id="emailError"></p>

              <button type="button" class="btn-primary" id="sendCodeButton">
                <span class="btn-primary__label">Send Verification Code</span>
                <span class="btn-primary__spinner" aria-hidden="true"></span>
              </button>
            </section>

            <section class="form-step" id="codeStep">
              <div class="otp-group" id="otpGroup">
                <input
                  type="text"
                  class="otp-input"
                  maxlength="1"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                />
                <input
                  type="text"
                  class="otp-input"
                  maxlength="1"
                  inputmode="numeric"
                />
                <input
                  type="text"
                  class="otp-input"
                  maxlength="1"
                  inputmode="numeric"
                />
                <input
                  type="text"
                  class="otp-input"
                  maxlength="1"
                  inputmode="numeric"
                />
                <input
                  type="text"
                  class="otp-input"
                  maxlength="1"
                  inputmode="numeric"
                />
                <input
                  type="text"
                  class="otp-input"
                  maxlength="1"
                  inputmode="numeric"
                />
              </div>
              <p class="form-field__error" id="codeError"></p>

              <button type="button" class="btn-primary" id="verifyCodeButton">
                <span class="btn-primary__label">Verify Code</span>
                <span class="btn-primary__spinner" aria-hidden="true"></span>
              </button>

              <button
                type="button"
                class="btn-secondary"
                id="backToEmailButton"
              >
                Back to Email
              </button>
            </section>

            <section class="form-step" id="passwordStep">
              <div class="form-field" id="passwordField">
                <span class="form-field__icon" aria-hidden="true"
                  >&#128274;</span
                >
                <label for="newPassword" class="visually-hidden"
                  >New Password</label
                >
                <input
                  type="password"
                  id="newPassword"
                  name="newPassword"
                  class="form-field__input"
                  placeholder="New Password"
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="form-field__toggle"
                  id="togglePassword"
                  aria-label="Show password"
                >
                  &#128065;
                </button>
              </div>
              <p class="form-field__error" id="passwordError"></p>

              <div class="form-field" id="confirmPasswordField">
                <span class="form-field__icon" aria-hidden="true"
                  >&#128274;</span
                >
                <label for="confirmPassword" class="visually-hidden"
                  >Confirm Password</label
                >
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  class="form-field__input"
                  placeholder="Confirm Password"
                  autocomplete="new-password"
                />
              </div>
              <p class="form-field__error" id="confirmPasswordError"></p>

              <button
                type="button"
                class="btn-primary"
                id="resetPasswordButton"
              >
                <span class="btn-primary__label">Reset Password</span>
                <span class="btn-primary__spinner" aria-hidden="true"></span>
              </button>

              <button type="button" class="btn-secondary" id="backToCodeButton">
                Back to Code
              </button>
            </section>
          </form>

          <p class="form-message" id="formMessage" role="alert"></p>

          <p class="form-card__footer">
            Remember your password?
            <a href="login.html" class="form-link">Sign In</a>
          </p>
        </div>
      </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/forgot_password.js"></script>
  </body>
</html>
